name: Deploy to Firebase Hosting
on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: npm ci
      
      # Inject ALL secrets from GitHub into .env for Vite production build
      - name: Create .env for production build
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
          echo "VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" >> .env
          echo "VITE_EMAILJS_SERVICE_ID=${{ secrets.VITE_EMAILJS_SERVICE_ID }}" >> .env
          echo "VITE_EMAILJS_PUBLIC_KEY=${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}" >> .env
          echo "VITE_EMAILJS_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}" >> .env
          echo "VITE_EMAILJS_INTEREST_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_INTEREST_TEMPLATE_ID }}" >> .env
          echo "VITE_EMAILJS_STATUS_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_STATUS_TEMPLATE_ID }}" >> .env
          echo "VITE_EMAILJS_WELCOME_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_WELCOME_TEMPLATE_ID }}" >> .env
          echo "VITE_EMAILJS_ADMIN_NOTIFY_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_ADMIN_NOTIFY_TEMPLATE_ID }}" >> .env
          echo "VITE_ADMIN_EMAILS=${{ secrets.VITE_ADMIN_EMAILS }}" >> .env
          echo "VITE_CREATE_PROFILE_FUNCTION_URL=${{ secrets.VITE_CREATE_PROFILE_FUNCTION_URL }}" >> .env
          echo "VITE_ONBOARDING_EMAIL_FUNCTION_URL=${{ secrets.VITE_ONBOARDING_EMAIL_FUNCTION_URL }}" >> .env
          echo "VITE_WELCOME_EMAIL_FUNCTION_URL=${{ secrets.VITE_WELCOME_EMAIL_FUNCTION_URL }}" >> .env
          echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}" >> .env
          echo "VITE_APPCHECK_RECAPTCHA_SITE_KEY=${{ secrets.VITE_APPCHECK_RECAPTCHA_SITE_KEY }}" >> .env

      - run: npm run build
      
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MOVEASY_30EED }}'
          channelId: live
          projectId: moveasy-30eed
